<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>whoseportisitanyway — TUI port monitor for developers</title>
<meta name="description" content="Cross-platform terminal UI that discovers which ports are in use, identifies the owning process, detects the project and framework, and lets you act on them." />
<meta name="color-scheme" content="light dark" />
<link rel="stylesheet" href="page.css" />
<script>
  (function () {
    try {
      var saved = localStorage.getItem('wp-theme');
      if (saved === 'light' || saved === 'dark') {
        document.documentElement.setAttribute('data-theme', saved);
        return;
      }
    } catch (_) {}
    var dark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  })();
</script>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
